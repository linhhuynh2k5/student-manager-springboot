<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên & học phí</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-center mb-4">🎓 QUẢN LÝ SINH VIÊN</h2>

<!-- FORM -->
<div class="card p-3 mb-3">
    <input type="hidden" id="index">

    <div class="row g-2">
        <div class="col">
            <input id="name" class="form-control" placeholder="Họ tên">
        </div>

        <div class="col">
            <input id="age" type="number" class="form-control" placeholder="Tuổi">
        </div>

        <div class="col">
            <input id="email" class="form-control" placeholder="Email">
        </div>

        <div class="col">
            <button class="btn btn-success w-100" onclick="save()">Lưu</button>
        </div>
    </div>
</div>

<!-- SEARCH -->
<div class="input-group mb-3">
    <input id="search" class="form-control" placeholder="Tìm theo tên">
    <button class="btn btn-primary" onclick="searchStudent()">Tìm</button>
</div>

<!-- TABLE -->
<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>#</th>
        <th>Tên</th>
        <th>Tuổi</th>
        <th>Email</th>
        <th>Hành động</th>
    </tr>
    </thead>

    <tbody id="data"></tbody>
</table>

<hr class="my-5">

<!-- HỌC PHÍ -->
<h2 class="text-center mb-4">💰 QUẢN LÝ HỌC PHÍ</h2>

<div class="card p-3 mb-3">
    <button class="btn btn-warning" onclick="loadTuition()">
        Xem học phí
    </button>
</div>

<ul class="list-group" id="result"></ul>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let filtered = [...students];

function render(list) {

    let html = "";

    list.forEach((s, i) => {

        html += `
        <tr>
            <td>${i + 1}</td>
            <td>${s.name}</td>
            <td>${s.age}</td>
            <td>${s.email}</td>

            <td>
                <button class="btn btn-warning btn-sm"
                    onclick="edit(${i})">
                    Sửa
                </button>

                <button class="btn btn-danger btn-sm"
                    onclick="del(${i})">
                    Xóa
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = html;
}

function save() {

const index = document.getElementById("index").value;

const student = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    email: document.getElementById("email").value
};

if (!student.name || !student.age || !student.email) {
    alert("Nhập đủ thông tin!");
    return;
}

if (index === "") {
    students.push(student);
} else {
    students[index] = student;
}

localStorage.setItem("students", JSON.stringify(students));

clearForm();

render(students);
}

function del(i) {

    if (confirm("Xóa sinh viên này?")) {

        students.splice(i, 1);

        localStorage.setItem("students",
            JSON.stringify(students));

        render(students);
    }
}

function edit(i) {

    index.value = i;

    name.value = students[i].name;
    age.value = students[i].age;
    email.value = students[i].email;
}

function searchStudent() {

    const key = search.value.toLowerCase();

    filtered = students.filter(s =>
        s.name.toLowerCase().includes(key)
    );

    render(filtered);
}

function clearForm() {

    index.value = "";
    name.value = "";
    age.value = "";
    email.value = "";
}

render(students);

async function loadTuition() {

    try {

        const response = await fetch('/api/tuition');

        const data = await response.json();

        let html = '';

        data.forEach(item => {

            html += `
                <li class="list-group-item">
                    <b>Tín chỉ:</b> ${item.totalCredits}
                    |
                    <b>Tổng tiền:</b> ${item.netAmount}
                </li>
            `;
        });

        document.getElementById('result').innerHTML = html;

    } catch (error) {

        alert("Không load được API học phí!");
        console.log(error);
    }
}

</script>

</body>
</html>
