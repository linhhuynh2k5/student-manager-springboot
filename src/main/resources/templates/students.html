<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f4f7fb;
        }

        .header{
            background: linear-gradient(135deg,#4e73df,#224abe);
            color:white;
            padding:30px;
            border-radius:20px;
            margin-bottom:30px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .card-custom{
            border:none;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .section-title{
            font-weight:bold;
            color:#224abe;
        }

        .table{
            border-radius:15px;
            overflow:hidden;
        }

        .btn-custom{
            border-radius:10px;
        }

        .money{
            color:#198754;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container py-4">

    <!-- HEADER -->

    <div class="header text-center">

        <h1>🎓 STUDENT MANAGEMENT SYSTEM</h1>

        <p class="mb-0">
            Hệ thống quản lý sinh viên và học phí
        </p>

    </div>

    <!-- QUẢN LÝ SINH VIÊN -->

    <div class="card card-custom p-4 mb-4">

        <h3 class="section-title mb-4">
            👨‍🎓 Quản lý sinh viên
        </h3>

        <input type="hidden" id="index">

        <div class="row g-3">

            <div class="col-md-4">
                <input id="name"
                       class="form-control"
                       placeholder="Nhập họ tên">
            </div>

            <div class="col-md-2">
                <input id="age"
                       type="number"
                       class="form-control"
                       placeholder="Tuổi">
            </div>

            <div class="col-md-4">
                <input id="email"
                       class="form-control"
                       placeholder="Email">
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100 btn-custom"
                        onclick="save()">
                    Lưu
                </button>
            </div>

        </div>

        <!-- SEARCH -->

        <div class="input-group mt-4">

            <input id="search"
                   class="form-control"
                   placeholder="Tìm sinh viên theo tên">

            <button class="btn btn-primary"
                    onclick="searchStudent()">
                Tìm kiếm
            </button>

        </div>

        <!-- TABLE -->

        <div class="table-responsive mt-4">

            <table class="table table-hover table-bordered">

                <thead class="table-dark">

                <tr>
                    <th>#</th>
                    <th>Họ tên</th>
                    <th>Tuổi</th>
                    <th>Email</th>
                    <th width="180">Hành động</th>
                </tr>

                </thead>

                <tbody id="data"></tbody>

            </table>

        </div>

    </div>

    <!-- HỌC PHÍ -->

    <div class="card card-custom p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h3 class="section-title mb-0">
                💰 Quản lý học phí
            </h3>

            <button class="btn btn-warning btn-custom"
                    onclick="loadTuition()">

                Xem học phí

            </button>

        </div>

        <div id="result"></div>

    </div>

</div>

<script>

    let students =
        JSON.parse(localStorage.getItem("students")) || [];

    let filtered = [...students];

    function render(list) {

        let html = "";

        list.forEach((s, i) => {

            html += `
            <tr>

                <td>${i + 1}</td>

                <td>${s.name}</td>

                <td>${s.age}</td>

                <td>${s.email}</td>

                <td>

                    <button
                        class="btn btn-warning btn-sm"
                        onclick="edit(${i})">

                        Sửa

                    </button>

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="del(${i})">

                        Xóa

                    </button>

                </td>

            </tr>
            `;
        });

        document.getElementById("data").innerHTML = html;
    }

    function save() {

        const index =
            document.getElementById("index").value;

        const student = {

            name:
                document.getElementById("name").value,

            age:
                document.getElementById("age").value,

            email:
                document.getElementById("email").value
        };

        if (!student.name ||
            !student.age ||
            !student.email) {

            alert("Vui lòng nhập đầy đủ thông tin!");
            return;
        }

        if (index === "") {

            students.push(student);

        } else {

            students[index] = student;
        }

        localStorage.setItem(
            "students",
            JSON.stringify(students)
        );

        clearForm();

        render(students);
    }

    function del(i) {

        if (confirm("Bạn có muốn xóa sinh viên này?")) {

            students.splice(i, 1);

            localStorage.setItem(
                "students",
                JSON.stringify(students)
            );

            render(students);
        }
    }

    function edit(i) {

        document.getElementById("index").value = i;

        document.getElementById("name").value =
            students[i].name;

        document.getElementById("age").value =
            students[i].age;

        document.getElementById("email").value =
            students[i].email;
    }

    function searchStudent() {

        const key =
            document.getElementById("search")
            .value.toLowerCase();

        filtered = students.filter(s =>
            s.name.toLowerCase().includes(key)
        );

        render(filtered);
    }

    function clearForm() {

        document.getElementById("index").value = "";

        document.getElementById("name").value = "";

        document.getElementById("age").value = "";

        document.getElementById("email").value = "";
    }

    render(students);

    async function loadTuition() {

let html = '';

students.forEach((s, i) => {

    const credits = 15 + i;

    const tuition = credits * 250000;

    html += `

    <div class="card mb-3 border-0 shadow-sm">

        <div class="card-body">

            <h5>
                👨‍🎓 ${s.name}
            </h5>

            <p>
                📚 Số tín chỉ:
                <b>${credits}</b>
            </p>

            <p class="money">
                💵 Học phí:
                ${tuition.toLocaleString()} VNĐ
            </p>

            <span class="badge bg-success">
                Đã cập nhật
            </span>

        </div>

    </div>
    `;
});

document.getElementById('result').innerHTML = html;
}

</script>

</body>
</html>
